<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Shuffle</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME SCREEN -->
<div id="home-screen" class="screen active">
  <img src="homepage.jpg" class="bg-image">
  <button class="play-btn" onclick="showRules()">PLAY NOW</button>
</div>

<!-- RULES SCREEN -->
<div id="rules-screen" class="screen">
  <img src="background.jpg" class="bg-image">
  <h2 class="rules-title">How To Play</h2>
  <button class="start-btn" onclick="startGame()">START GAME</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">

  <div id="gameContainer">

    <!-- TOP BAR -->
    <div id="topBar">
      <div>Score: <span id="score">0</span></div>
      <div>Time: <span id="timer">200</span></div>
    </div>

    <!-- GAME BOARD -->
    <div id="board"></div>

    <!-- BUTTON -->
    <button id="freezeBtn">Freeze Grid</button>

    <!-- MESSAGE -->
    <div id="message"></div>

  </div>

  <!-- END SCREEN -->
  <div id="endScreen">
    <div id="endContent">
      <h2 id="endMessage">Time’s up!</h2>
      <button id="playAgainBtn">Play Again</button>
      <button id="homeBtn">Home</button>
    </div>
  </div>

</div>

<!-- SCRIPTS -->
<script src="dictionary.js"></script>
<script src="game.js"></script>

</body>
</html>
